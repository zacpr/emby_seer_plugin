name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Extract version from tag
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Update version in .csproj
      run: |
        sed -i 's/<Version>.*<\/Version>/<Version>${{ steps.get_version.outputs.VERSION }}<\/Version>/' src/Inseerrtion/Inseerrtion.csproj

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Release
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal

    - name: Create plugin package
      run: |
        mkdir -p ./release/Inseerrtion
        cp src/Inseerrtion/bin/Release/netstandard2.0/Inseerrtion.dll ./release/Inseerrtion/
        cp src/Inseerrtion/bin/Release/netstandard2.0/Inseerrtion.pdb ./release/Inseerrtion/
        
        # Create meta.json for Emby plugin catalog
        cat > ./release/Inseerrtion/meta.json << 'EOF'
        {
          "name": "Inseerrtion",
          "description": "Integrate Seerr media requests directly into Emby",
          "version": "${{ steps.get_version.outputs.VERSION }}",
          "targetAbi": "4.10.0.0",
          "sourceUrl": "https://github.com/${{ github.repository }}",
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "guid": "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        }
        EOF
        
        cd ./release
        zip -r ../Inseerrtion-${{ steps.get_version.outputs.VERSION }}.zip Inseerrtion/
        cd ..

    - name: Generate release notes
      id: release_notes
      run: |
        # Get changes since last tag
        LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
        if [ -z "$LAST_TAG" ]; then
          CHANGES=$(git log --pretty=format:"- %s" --no-merges)
        else
          CHANGES=$(git log --pretty=format:"- %s" --no-merges $LAST_TAG..HEAD)
        fi
        
        cat > RELEASE_NOTES.md << EOF
        ## Inseerrtion v${{ steps.get_version.outputs.VERSION }}
        
        ### Changes
        $CHANGES
        
        ### Installation
        1. Download the ZIP file
        2. Extract to your Emby plugins folder:
           - Windows: \`%ProgramData%\\Emby-Server\\plugins\\\`
           - Linux/macOS: \`/var/lib/emby/plugins/\` or \`~/.config/emby-server/plugins/\`
        3. Restart Emby server
        4. Configure the plugin in Emby Dashboard → Plugins → Inseerrtion
        
        ### Requirements
        - Emby Server 4.10.0 or higher
        - Seerr instance (v1.x or higher)
        
        ### Configuration
        1. Go to Dashboard → Plugins → Inseerrtion
        2. Enter your Seerr URL (e.g., http://localhost:5055)
        3. Enter your Seerr API Key (from Seerr Settings → General → API Key)
        4. Click Save to test the connection
        EOF

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Inseerrtion v${{ steps.get_version.outputs.VERSION }}
        body_path: RELEASE_NOTES.md
        files: |
          Inseerrtion-${{ steps.get_version.outputs.VERSION }}.zip
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}

    - name: Upload release artifact
      uses: actions/upload-artifact@v4
      with:
        name: inseerrtion-release-${{ steps.get_version.outputs.VERSION }}
        path: Inseerrtion-${{ steps.get_version.outputs.VERSION }}.zip
