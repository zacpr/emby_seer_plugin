name: Integration Test

on:
  workflow_dispatch:
    inputs:
      seerr_url:
        description: 'Seerr instance URL'
        required: true
        default: 'http://localhost:5055'
      seerr_api_key:
        description: 'Seerr API Key'
        required: true

jobs:
  test-connection:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test Seerr Connection
      run: |
        # Create a simple test script
        cat > test_connection.cs << 'EOF'
        using System;
        using System.Net.Http;
        using System.Net.Http.Headers;
        using System.Text.Json;
        using System.Threading.Tasks;
        
        var url = "${{ github.event.inputs.seerr_url }}";
        var apiKey = "${{ github.event.inputs.seerr_api_key }}";
        
        try
        {
            using var client = new HttpClient();
            client.BaseAddress = new Uri(url);
            client.DefaultRequestHeaders.Add("X-Api-Key", apiKey);
            
            Console.WriteLine($"Testing connection to {url}...");
            var response = await client.GetAsync("/api/v1/status");
            
            if (response.IsSuccessStatusCode)
            {
                var content = await response.Content.ReadAsStringAsync();
                var doc = JsonDocument.Parse(content);
                var version = doc.RootElement.GetProperty("version").GetString();
                Console.WriteLine($"✅ Successfully connected to Seerr v{version}");
                return 0;
            }
            else
            {
                Console.WriteLine($"❌ Connection failed: {response.StatusCode}");
                var error = await response.Content.ReadAsStringAsync();
                Console.WriteLine($"Error: {error}");
                return 1;
            }
        }
        catch (Exception ex)
        {
            Console.WriteLine($"❌ Connection error: {ex.Message}");
            return 1;
        }
        EOF
        
        # This is just a placeholder - in reality we'd need to run actual integration tests
        echo "Integration test placeholder - would test against: ${{ github.event.inputs.seerr_url }}"
        echo "In a real scenario, we'd spin up Emby and Seerr in Docker and test the full flow"
